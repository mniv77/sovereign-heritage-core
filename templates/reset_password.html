<!-- templates/reset_password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault | Recovery Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background-color: #020617; color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; 
        }
        
        .auth-card { 
            background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 40px; width: 90%; max-width: 420px; padding: 2.5rem; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); 
        }
        
        input { 
            background-color: #1e293b; border: 1px solid #334155; color: white !important; 
            padding: 16px; border-radius: 18px; font-size: 16px; width: 100%; outline: none; margin-top: 4px; 
        }
        input:focus { border-color: #6366f1; }
        
        .btn-primary { 
            background: #6366f1; color: white; padding: 18px; border-radius: 20px; 
            font-weight: 800; font-size: 15px; width: 100%; text-transform: uppercase; 
            margin-top: 1rem; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); 
        }
        
        .alert { 
            padding: 1rem; border-radius: 16px; margin-bottom: 1.5rem; text-align: center; 
            font-size: 11px; font-weight: 800; text-transform: uppercase; 
            border: 1px solid rgba(244, 63, 94, 0.2); background: rgba(244, 63, 94, 0.1); color: #fb7185; 
        }
        
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="auth-card text-left">
        <div class="text-center mb-8">
            <div class="h-14 w-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/20">
                <i class="fas fa-key text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-black text-white uppercase italic leading-none">Vault Recovery</h1>
            <p class="text-[10px] font-bold text-slate-500 mt-2 uppercase tracking-widest">Hardware Override Protocol</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert border {% if category == 'success' %}bg-emerald-500/10 border-emerald-500/20 text-emerald-400{% else %}bg-rose-500/10 border-rose-500/20 text-rose-400{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/reset_password" class="space-y-4">
            <div>
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            
            <div>
                <label class="text-indigo-400">System Master Key</label>
                <input type="password" name="recovery_key" placeholder="Enter System Key..." required>
                <p class="text-[8px] text-slate-600 mt-1 ml-2 uppercase font-bold tracking-widest">Owned by Admin</p>
            </div>

            <div>
                <label class="text-indigo-400">Security Answer</label>
                <input type="text" name="security_answer" placeholder="Your secret answer..." required>
            </div>

            <div>
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="••••••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Update Password</button>
        </form>

        <div class="mt-8 text-center pt-6 border-t border-white/5">
            <a href="/login" class="text-[11px] font-black text-indigo-400 uppercase tracking-widest">Return to Login</a>
        </div>
    </div>

</body>
</html>
